name: CI

# Build + validate on every PR and on pushes to non-main branches.
# `main` is covered by deploy.yml (which builds before it deploys).
on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build catalogue (npm run build → sync:catalog)
        env:
          # The Sanity *project id* is public — safe as a repo Variable, not a Secret.
          # If unset, fetch-sanity.js exits 0 and the site builds from manual sources.
          SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ vars.SANITY_DATASET }}
        run: npm run build

      - name: Validate every data/*.json parses
        run: |
          for f in data/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('ok:', '$f')"
          done

      - name: Assert generated artefacts exist
        run: |
          test -s assets/products.js || { echo '::error::assets/products.js missing/empty after build'; exit 1; }
          test -s data/catalog.json  || { echo '::error::data/catalog.json missing/empty after build';  exit 1; }

      # NOTE: no "generated files are up to date" check here. The rebuild.yml
      # workflow owns content freshness (rebuilds from Sanity on a schedule and
      # commits), so committed build output legitimately drifts between rebuilds.
      # CI only proves a PR builds cleanly and emits valid JSON.
