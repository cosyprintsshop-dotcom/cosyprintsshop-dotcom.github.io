<!DOCTYPE html>
<html lang="fr" class="no-js">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>
  (function () {
    document.documentElement.classList.remove('no-js');
  })();
</script>

<title data-i18n="e404.title">Page introuvable — CosyPrints</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#faf9f6" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23faf9f6'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-style='italic' font-size='20' text-anchor='middle' fill='%232d312a'%3EC%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..600;1,400..600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<!-- Absolute path: 404.html can be served for a missing URL at any depth. -->
<link rel="stylesheet" href="/assets/theme.css" />

<style>
  body { min-height: 100dvh; display: grid; place-items: center; padding: 40px var(--gutter); }
  .err { max-width: 620px; text-align: center; }
  .err__code { font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; color: var(--sage-deep); }
  .err__big { font-family: var(--serif); font-weight: 400; font-size: clamp(5rem, 22vw, 11rem); line-height: 0.9; letter-spacing: -0.03em; margin: 10px 0 4px; }
  .err__title { font-family: var(--serif); font-weight: 400; font-style: italic; font-size: clamp(1.4rem, 4vw, 2.1rem); line-height: 1.12; }
  .err__msg { color: var(--ink-soft); margin: 18px auto 32px; max-width: 46ch; }
  .err__actions { display: flex; flex-wrap: wrap; gap: 14px 26px; justify-content: center; align-items: center; }
  .err__wordmark { display: inline-block; margin-bottom: 40px; font-family: var(--serif); font-size: 1.2rem; }
</style>
</head>
<body>
  <main class="err">
    <a class="err__wordmark" href="/" translate="no">CosyPrints</a>
    <p class="err__code" data-i18n="e404.code">Erreur 404</p>
    <p class="err__big" aria-hidden="true">404</p>
    <h1 class="err__title" data-i18n="e404.title_h">Cette page s'est imprimée de travers.</h1>
    <p class="err__msg" data-i18n="e404.msg">La page que vous cherchez n'existe pas, ou plus. Revenez à l'accueil pour parcourir nos collections.</p>
    <div class="err__actions">
      <a class="btn btn--sage" href="/" data-i18n="e404.home">Retour à l'accueil</a>
      <a class="ulink" href="/boutique.html" data-i18n="e404.catalogue">Voir la boutique</a>
    </div>
  </main>

  <!-- Bilingual layer (absolute paths for any-depth 404 serving) -->
  <script src="/assets/i18n.en.js"></script>
  <script src="/assets/i18n.js"></script>
</body>
</html>
